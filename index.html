    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .console-font {
      font-family: 'JetBrains Mono', monospace;
    }
    
    /* --- CRITICAL: PREMIUM PRINT/PDF DOWNLOAD OPTIMIZATIONS --- */
    @media print {
      /* Hide entire web app UI, sidebars, dashboard elements, and buttons */
      body {
        background-color: #ffffff !important;
        color: #000000 !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      header, aside, main > *:not(#exam-paper-section), .print\:hidden, button, .action-bar, .bg-slate-950, #exam-paper-container-controls {
        display: none !important;
      }
      /* Expand the exam paper to full printable page dimensions */
      #exam-paper-section {
        width: 100% !important;
        max-width: 100% !important;
        position: absolute;
        left: 0;
        top: 0;
        margin: 0 !important;
        padding: 0 !important;
      }
      #exam-paper-container {
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
      }
      /* Prevent ugly break points in middle of questions */
      .question-item {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      .section-block {
        page-break-inside: auto !important;
      }
    }
  </style>
</head>

    // --- NOTIFICATION HANDLER ---
    function triggerNotification(message, type = 'success') {
      state.notification = { message, type };
      render();
      setTimeout(() => {

        render();

    }

    // --- ACTIONS & OPERATIONS ---
    window.handleAuthSubmit = function(e) {
      e.preventDefault();
      state.isLoggedIn = true;
      triggerNotification(`Welcome back, ${state.teacherName}! Successfully synchronized session.`);
    };

    window.toggleAuthMode = function() {
      state.authMode = state.authMode === 'login' ? 'signup' : 'login';
      render();
    };

    window.setGuestMode = function() {
      state.isLoggedIn = true;
      triggerNotification("Accessing VedaAI under guest credential sandbox.");
    };

    window.changeTab = function(tabName) {
      state.activeTab = tabName;
      state.sidebarOpen = false;
      render();
    };

    window.changeStep = function(stepNum) {
      state.activeStep = stepNum;
      render();
    };

    window.toggleSidebar = function() {
      state.sidebarOpen = !state.sidebarOpen;
      render();
    };

    window.addSectionRow = function() {
      const newId = `sec-${Date.now()}`;
      state.sectionsConfig.push({
        id: newId,
        name: `Section ${String.fromCharCode(65 + state.sectionsConfig.length)}`,
        type: 'mcq',
        count: 3,
        marksPerQuest: 4,
        difficulty: 'Medium'
      });
      render();
    };

    window.removeSectionRow = function(id) {
      if (state.sectionsConfig.length > 1) {
        state.sectionsConfig = state.sectionsConfig.filter(sec => sec.id !== id);
        render();
      }
    };

    window.updateSectionField = function(id, field, value) {
      state.sectionsConfig = state.sectionsConfig.map(sec => {
        if (sec.id === id) {
          return { ...sec, [field]: value };
        }
        return sec;
      });
      render();
    };

    window.loadPreset = function(presetName) {
      if (presetName === 'AI ethics') {
        state.topic = 'Ethics and Bias in Artificial Intelligence';
        state.gradeLevel = 'Grade 11';
        state.additionalInstructions = 'Explain algorithmic bias, filter bubbles, and generate 1 case scenario question on autonomous vehicles.';
        state.sourceText = 'Artificial intelligence bias occurs when an algorithm outputs systematically prejudiced results due to erroneous assumptions in the machine learning process. Guardrails include algorithmic audits, diverse training datasets, and explainable models.';
      } else if (presetName === 'Calculus') {
        state.topic = 'Introduction to Derivatives and Limits';
        state.gradeLevel = 'Grade 12';
        state.additionalInstructions = 'Include a limits equation question and physical representation of instantaneous rate of change.';
        state.sourceText = 'The derivative of a function of a real variable measures the sensitivity to change of the output value with respect to a change in its input value. Derivatives are a fundamental tool of calculus.';
      } else {
        state.topic = 'Photosynthesis and Plant Cellular Respiration';
        state.gradeLevel = 'Grade 10';
        state.additionalInstructions = 'Focus on light reactions, Calvin cycle, and metabolic ATP conversion.';
        state.sourceText = 'Photosynthesis converts light energy into chemical energy stored in carbohydrates inside chloroplasts. Plants then execute respiration in their mitochondria to break glucose and generate ATP for physiological actions.';

      triggerNotification(`Populated creator workspace with '${presetName}' preset.`);

    // --- AI PAPER SYNTHESIZER WITH DISTRIBUTED QUEUE EMULATION ---
    const delay = (ms) => new Promise(res => setTimeout(res, ms));

    window.runSimulationAndGenerate = async function() {
      state.activeStep = 2;
      state.processingState = 'queuing';
      state.queueProgress = 5;
      state.queueLogs = [
        { timestamp: new Date().toLocaleTimeString(), message: "🚀 WebSocket: Client initialized assessment request.", type: "client" },
        { timestamp: new Date().toLocaleTimeString(), message: "📦 API Gateway: Validated user parameters successfully.", type: "info" },
        { timestamp: new Date().toLocaleTimeString(), message: "🔄 BullMQ: Enqueued background job 'generate-assessment' in queue: 'veda-jobs'.", type: "redis" },
        { timestamp: new Date().toLocaleTimeString(), message: "💾 Redis: Cached initial job state status 'queued' with ID: 'job_88a101b2f'.", type: "redis" }
      ];
      render();

      await delay(1200);
      state.queueProgress = 25;
      state.queueLogs.push(
        { timestamp: new Date().toLocaleTimeString(), message: "⚡ BullMQ Worker [Instance-04]: Acquired job 'job_88a101b2f' from Redis cluster.", type: "worker" },
        { timestamp: new Date().toLocaleTimeString(), message: "📂 Worker: Fetching supplementary instructions and optional textbook passage.", type: "info" }
      );
      state.processingState = 'working';
      render();

      await delay(1000);
      state.queueProgress = 50;
      state.queueLogs.push(
        { timestamp: new Date().toLocaleTimeString(), message: "🤖 AI Core: Preparing structured prompt template...", type: "ai" },

      );
      render();

      try {
        const livePaper = await fetchPaperFromAI();
        state.generatedPaper = livePaper;
        state.queueProgress = 85;
        state.queueLogs.push(
          { timestamp: new Date().toLocaleTimeString(), message: "✅ Gemini API: Successfully parsed response into strict exam structure.", type: "ai" },
          { timestamp: new Date().toLocaleTimeString(), message: "💾 Redis: Caching generated exam paper layout for quick loading (TTL: 24h).", type: "redis" },
          { timestamp: new Date().toLocaleTimeString(), message: "⚡ Worker: Finished processing 'generate-assessment' job successfully.", type: "worker" }
        );
        render();
        
        await delay(800);
        state.queueProgress = 100;
        state.queueLogs.push({ timestamp: new Date().toLocaleTimeString(), message: "📢 WebSocket: Dispatched final payload 'assessment_ready' to client UI.", type: "client" });
        state.processingState = 'completed';
        
        // Save to Library mock list
        const calculatedTotalMarks = state.sectionsConfig.reduce((sum, sec) => sum + (sec.count * sec.marksPerQuest), 0);

          id: `lib-${Date.now()}`,
          title: livePaper.title || `Custom Exam: ${state.topic}`,
          topic: state.topic,
          grade: state.gradeLevel,

          isPremium: true

        state.dashboardStats.totalAssessments += 1;
        
        render();
        await delay(600);
        state.activeStep = 3;
        render();
      } catch (error) {
        console.warn("Gemini Live prompt failed or offline. Continuing with fallback blueprint.", error);
        state.queueLogs.push(
          { timestamp: new Date().toLocaleTimeString(), message: "⚠️ Live LLM prompt failed or key missing. Loading fallback blueprint.", type: "warning" },
          { timestamp: new Date().toLocaleTimeString(), message: "💾 Redis: Retrieved fallback templates successfully from memory cache.", type: "redis" },

        );
        state.generatedPaper = fallbackPaper;
        render();
        
        await delay(1200);
        state.queueProgress = 100;
        state.processingState = 'completed';
        render();
        await delay(600);

    async function fetchPaperFromAI() {
      const calculatedTotalMarks = state.sectionsConfig.reduce((sum, sec) => sum + (sec.count * sec.marksPerQuest), 0);
      const formattedSections = state.sectionsConfig.map(s => 
        `- ${s.name}: Type is "${s.type}" (${s.count} questions, ${s.marksPerQuest} marks each, ${s.difficulty} difficulty)`
      ).join("\n");

      const systemPrompt = `You are VedaAI, an elite syllabus assessment design system. You output valid JSON conforming exactly to the requested scheme. Do not include raw conversational explanations. Output only a JSON object.`;
      const userQuery = `Create a real school exam paper based on:
Topic: ${state.topic}
Grade: ${state.gradeLevel}
Total Target Marks: ${calculatedTotalMarks}
Context / Source material: ${state.sourceText}
Additional Instructions: ${state.additionalInstructions}
Grading Standard: ${state.gradingStandard}

Generate the exam containing these exact sections:
${formattedSections}

Your output MUST be a JSON object with this exact structure:
{
  "title": "Title of the Assessment",
  "grade": "${state.gradeLevel}",
  "totalMarks": ${calculatedTotalMarks},
  "duration": "1 Hour 45 Minutes",
  "instructions": "General exam paper instructions for the students.",
  "sections": [
    {
      "id": "sec-a",
      "title": "Section Title (e.g. Section A: Multiple Choice)",
      "instruction": "Instructions for this section",
      "questions": [
        {
          "id": "unique-q-id-1",
          "text": "The full question text",
          "difficulty": "Easy",
          "marks": 2,
          "type": "mcq",
          "options": ["Option A", "Option B", "Option C", "Option D"]
        }
      ]
    }
  ]
}`;

      let retries = 3;
      let delayMs = 1000;
      while (retries > 0) {
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: userQuery }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] },
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          if (!response.ok) throw new Error(`HTTP status error: ${response.status}`);
          const data = await response.json();
          const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!rawText) throw new Error("Empty candidate response");
          return JSON.parse(rawText.trim());
        } catch (e) {
          retries--;
          if (retries === 0) throw e;
          await delay(delayMs);
          delayMs *= 2;
        }
      }
    }

      state.groups = state.groups.filter(g => g.id !== id);

    // --- INLINE PAPER EDITING ACTIONS ---

      state.editingQuestionId = id;

      state.editedQuestionMarks = marks;

    window.saveEditedQuestion = function(sectionId, questId) {
      const textVal = document.getElementById(`edit-text-${questId}`).value;
      const marksVal = document.getElementById(`edit-marks-${questId}`).value;

      state.generatedPaper.sections = state.generatedPaper.sections.map(sec => {
        if (sec.id === sectionId) {
          return {
            ...sec,
            questions: sec.questions.map(q => {
              if (q.id === questId) {
                return { ...q, text: textVal, marks: parseInt(marksVal) || q.marks };
              }
              return q;
            })
          };
        }
        return sec;
      });

      // Recalculate total exam paper marks dynamically
      state.generatedPaper.totalMarks = state.generatedPaper.sections.reduce((acc, s) => {
        return acc + s.questions.reduce((sum, q) => sum + q.marks, 0);
      }, 0);

      state.editingQuestionId = null;
      triggerNotification("Question updated and marks total recalibrated!");
    };

    window.deleteQuestion = function(sectionId, questId) {
      state.generatedPaper.sections = state.generatedPaper.sections.map(sec => {
        if (sec.id === sectionId) {
          return {
            ...sec,
            questions: sec.questions.filter(q => q.id !== questId)
          };
        }
        return sec;
      });

      state.generatedPaper.totalMarks = state.generatedPaper.sections.reduce((acc, s) => {
        return acc + s.questions.reduce((sum, q) => sum + q.marks, 0);
      }, 0);

      triggerNotification("Question removed from assessment blueprint.");
    };

      const rubricPrompt = `You are VedaAI Rubric Assistant. Create a rich evaluation rubric for:
Topic: ${state.toolkitTopic}
Target Grade: ${state.toolkitGrade}
Parameters: ${state.toolkitCustomTarget}

Output a clean JSON format matching:
{
  "topic": "The Rubric Title",
  "criteriaList": [
    {
      "criteria": "Scientific terminology",
      "levels": {
        "Excellent": "Detailed description of excellent achievement",
        "Proficient": "Description of competent achievement",
        "Developing": "Description of partial achievement",
        "Novice": "Minimal scientific expression used"
      }
    }
  ]
}`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: rubricPrompt }] }],
            generationConfig: { responseMimeType: "application/json" }
          })
        });
        if (!response.ok) throw new Error("API call failed");
        const data = await response.json();
        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        state.generatedRubric = JSON.parse(rawText.trim());
        triggerNotification("Rubric criteria plotted successfully!");
      } catch (e) {
        state.generatedRubric = {
          topic: `Evaluative Rubric for ${state.toolkitTopic} (${state.toolkitGrade})`,
          criteriaList: [
            {
              criteria: "Conceptual Accuracy",
              levels: {
                "Excellent": "Demonstrates absolute command over transpiration dynamics, stomata mechanics, and water potentials.",
                "Proficient": "Accurately represents the essential mechanisms of osmosis with negligible minor terminology issues.",
                "Developing": "Struggles to distinguish clearly between osmotic potential and active mineral transport mechanisms.",
                "Novice": "Confuses essential processes of transpiration with standard capillary actions only."
              }
            },
            {
              criteria: "Analytical Explanations",
              levels: {
                "Excellent": "Offers precise, comprehensive answers outlining specific chemical factors and environment impacts.",
                "Proficient": "Answers capture the primary questions but lack rich physical parameters of cellular mechanics.",
                "Developing": "Explanations are highly repetitive, failing to elaborate on guard cell movement.",
                "Novice": "Fails to provide logical explanations for the requested scientific scenarios."
              }
            }
          ]
        };
        triggerNotification("Loaded premium preset fallback rubric.", "info");
      } finally {
        state.toolkitLoading = false;
        render();
      }
    };

    window.loadPaperFromLibrary = function(paperId) {
      if (paperId === 'lib-1') {
        state.generatedPaper = fallbackPaper;
      } else {
        state.generatedPaper = {
          title: "Ethics and Bias in Artificial Intelligence Mid-Term Exam",

            let questionsHtml = section.questions.map((quest, qIdx) => {
              
              // Edit mode vs static mode
              if (state.editingQuestionId === quest.id) {
                return `
                  <div class="bg-slate-50 p-4 rounded-xl border border-slate-300 space-y-3 print:hidden">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">Edit Question Content</label>
                    <textarea id="edit-text-${quest.id}" class="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-xs text-slate-800" rows="2">${quest.text}</textarea>
                    <div class="flex gap-2">
                      <div class="w-24">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Marks</label>
                        <input type="number" id="edit-marks-${quest.id}" value="${quest.marks}" class="w-full bg-white border border-slate-200 rounded-lg p-1.5 text-xs font-bold text-slate-800">
                      </div>
                      <div class="flex items-end gap-1.5">
                        <button onclick="saveEditedQuestion('${section.id}', '${quest.id}')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1">
                          <i data-lucide="check" class="w-3 h-3"></i> Save
                        </button>
                        <button onclick="state.editingQuestionId = null; render();" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold transition">Cancel</button>
                      </div>
                    </div>
                  </div>
                `;
              } else {
                let optionsHtml = '';
                if (quest.options && quest.options.length > 0) {
                  optionsHtml = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 pl-6 pt-1">
                      ${quest.options.map((option, optIdx) => `
                        <div class="text-xs text-slate-600 font-semibold flex items-center space-x-2">
                          <span class="w-5 h-5 rounded-full border border-slate-300 text-[10px] font-bold text-slate-500 flex items-center justify-center flex-shrink-0">
                            ${String.fromCharCode(65 + optIdx)}
                          </span>
                          <span>${option}</span>
                        </div>
                      `).join('')}
                    </div>
                  `;
                }

                let linesHtml = '';
                if (quest.type === 'short' || quest.type === 'long') {
                  linesHtml = `
                    <div class="pl-6 pt-2 space-y-2">
                      <div class="border-b border-dashed border-slate-300 h-6"></div>
                      <div class="border-b border-dashed border-slate-300 h-6"></div>
                      ${quest.type === 'long' ? `
                        <div class="border-b border-dashed border-slate-300 h-6"></div>
                        <div class="border-b border-dashed border-slate-300 h-6"></div>
                        <div class="border-b border-dashed border-slate-300 h-6 print:hidden"></div>
                      ` : ''}
                    </div>
                  `;
                }

                return `
                  <div class="relative group bg-white hover:bg-slate-50/40 p-3 rounded-xl transition print:p-0 print:hover:bg-transparent question-item">
                    <!-- Dynamic editing overlay panel -->
                    <div class="absolute right-2 top-2 hidden group-hover:flex items-center space-x-1.5 bg-white shadow-md border border-slate-200 rounded-lg p-1 z-10 print:hidden">
                      <button onclick="startEditingQuestion('${quest.id}', '${quest.text.replace(/'/g, "\\'")}', ${quest.marks})" class="p-1 hover:bg-slate-100 text-slate-600 rounded-md transition" title="Edit Question Content">
                        <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
                      </button>
                      <button onclick="deleteQuestion('${section.id}', '${quest.id}')" class="p-1 hover:bg-red-50 text-red-500 rounded-md transition" title="Delete Question">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                      </button>
                    </div>

                    <div class="space-y-2">
                      <div class="flex items-start justify-between gap-4">
                        <div class="text-xs font-bold text-slate-800 leading-relaxed flex gap-2">
                          <span class="font-extrabold text-slate-900">${qIdx + 1}.</span>
                          <span>${quest.text}</span>
                        </div>
                        <div class="flex items-center space-x-1.5 flex-shrink-0">
                          <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-md uppercase tracking-wider ${
                            quest.difficulty === 'Easy' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' :
                            quest.difficulty === 'Medium' ? 'bg-amber-50 text-amber-700 border border-amber-100' :
                            'bg-rose-50 text-rose-700 border border-rose-100'
                          }">${quest.difficulty}</span>
                          <span class="text-xs font-extrabold text-slate-900 flex-shrink-0 whitespace-nowrap">[${quest.marks} Marks]</span>
                        </div>
                      </div>
                      ${optionsHtml}
                      ${linesHtml}
                    </div>
                  </div>
                `;
              }
            }).join('');

            return `
              <div class="space-y-4 section-block">
                <!-- Section Header -->
                <div class="border-b-2 border-slate-900 pb-1.5 flex justify-between items-end">
                  <div>
                    <h3 class="text-sm font-black text-slate-900 uppercase tracking-wider">${section.title}</h3>
                    ${section.instruction ? `<p class="text-[11px] text-slate-500 italic mt-0.5">${section.instruction}</p>` : ''}
                  </div>
                  <span class="text-xs font-extrabold text-slate-950 uppercase tracking-wider">
                    ${section.questions.reduce((sum, q) => sum + q.marks, 0)} Marks Total
                  </span>
                </div>
                <!-- Section Questions Container -->
                <div class="space-y-5">${questionsHtml}</div>
              </div>
            `;
          }).join('');

          tabContent = `
            <div class="space-y-6">
              <!-- Action bar containing direct download to PDF -->
              <div id="exam-paper-container-controls" class="bg-white rounded-xl p-4 border border-slate-200 shadow-xs flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex flex-wrap items-center gap-2">
                  <span class="text-xs font-bold text-slate-500">Actions:</span>
                  <button onclick="changeStep(1)" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1">
                    <i data-lucide="sliders" class="w-3.5 h-3.5"></i> Edit Inputs / Re-generate
                  </button>
                  <button onclick="runSimulationAndGenerate()" class="bg-orange-50 hover:bg-orange-100 text-orange-700 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Regenerate Paper with AI
                  </button>
                </div>
                <div class="flex items-center gap-2 w-full md:w-auto">
                  <button onclick="triggerPrintPdf()" class="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5 shadow-md">
                    <i data-lucide="download" class="w-4 h-4"></i> Export / Download as PDF
                  </button>
                </div>
              </div>

              <!-- TARGET SECTION FOR PRINTING -->
              <div id="exam-paper-section" class="w-full">
                <!-- HIGH FIDELITY EXAM PAPER TEMPLATE -->
                <div id="exam-paper-container" class="bg-white border-2 border-slate-300 rounded-2xl shadow-xl max-w-4xl mx-auto p-8 sm:p-12 space-y-8">
                  
                  <!-- Exam Header -->
                  <div class="text-center space-y-2 border-b-4 border-double border-slate-900 pb-6 relative">
                    <div class="text-sm font-extrabold tracking-widest text-slate-500 uppercase">${state.schoolName}</div>
                    <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight uppercase">${state.generatedPaper.title || "Term Assessment"}</h1>
                    
                    <div class="flex flex-wrap justify-between items-center text-xs font-bold text-slate-600 pt-3 max-w-2xl mx-auto gap-2">
                      <div class="bg-slate-100 px-3 py-1 rounded-md">Grade: ${state.generatedPaper.grade || state.gradeLevel}</div>
                      <div class="bg-slate-100 px-3 py-1 rounded-md">Duration: ${state.generatedPaper.duration || "2 Hours"}</div>
                      <div class="bg-orange-100 text-orange-800 px-3 py-1 rounded-md">Max Marks: ${state.generatedPaper.totalMarks} Marks</div>
                    </div>

                    <div class="absolute top-0 right-0 text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-sm uppercase font-bold tracking-wider print:hidden select-none">
                      ${state.gradingStandard}
                    </div>
                  </div>

                  <!-- Student Information Form (Editable) -->
                  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 p-4 bg-slate-50/50 border border-slate-200 rounded-xl print:bg-transparent">
                    <div>
                      <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Student Name</label>
                      <input type="text" value="${state.studentName}" oninput="state.studentName = this.value" placeholder="Enter full name" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-bold text-slate-800 focus:outline-hidden print:placeholder-transparent print:border-none print:p-0">
                    </div>
                    <div>
                      <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Roll Number</label>
                      <input type="text" value="${state.studentRollNo}" oninput="state.studentRollNo = this.value" placeholder="e.g. 10B-08" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-bold text-slate-800 focus:outline-hidden print:placeholder-transparent print:border-none print:p-0">
                    </div>
                    <div>
                      <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Class Section</label>
                      <input type="text" value="${state.studentSection}" oninput="state.studentSection = this.value" placeholder="e.g. Section C" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-bold text-slate-800 focus:outline-hidden print:placeholder-transparent print:border-none print:p-0">
                    </div>
                  </div>

                  <!-- General Instructions -->
                  <div class="space-y-1">
                    <h4 class="text-xs font-black text-slate-900 uppercase tracking-wider">General Instructions:</h4>
                    <p class="text-xs text-slate-500 font-semibold leading-relaxed">${state.generatedPaper.instructions || "Candidates must write answers in blue/black ink only. Answer booklets are supplied on request."}</p>
                  </div>

                  <!-- Compiled Sections -->
                  <div class="space-y-8">${examSectionsHtml}</div>

                  <!-- Footer margin -->
                  <div class="text-center pt-8 border-t border-slate-200">
                    <span class="text-xs font-extrabold tracking-widest text-slate-400 uppercase">*** END OF QUESTION PAPER ***</span>
                  </div>

                </div>
              </div>
            </div>
          `;
        }
      }

      // 3. COMPILE MASTER DASHBOARD TEMPLATE (SIDEBARS & MENUS)
      root.innerHTML = `
        ${notifyHtml}
        
        <!-- MOBILE HEADER BAR -->
        <header class="md:hidden w-full bg-slate-950 text-white flex items-center justify-between p-4 shadow-md sticky top-0 z-50 print:hidden">
          <div class="flex items-center space-x-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-amber-500 to-orange-600 flex items-center justify-center font-bold text-white text-base">V</div>
            <span class="font-semibold tracking-wide text-lg text-white">VedaAI</span>
          </div>
          <button onclick="toggleSidebar()" class="p-2 text-slate-300 hover:text-white hover:bg-zinc-800 rounded-lg transition" aria-label="Toggle Menu">
            <i data-lucide="menu" class="w-6 h-6"></i>
          </button>
        </header>

        <!-- LEFT SIDEBAR -->
        <aside class="fixed inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 shadow-xl md:shadow-none flex flex-col justify-between p-6 transform transition-transform duration-300 ease-in-out md:static md:transform-none ${state.sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} print:hidden">
          <div class="space-y-8">
            <div class="flex items-center space-x-3 mt-2">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-orange-500 to-amber-600 flex items-center justify-center font-extrabold text-white text-lg shadow-md shadow-orange-500/20">V</div>
              <div>
                <div class="flex items-center space-x-1.5">
                  <span class="font-extrabold text-xl tracking-tight text-slate-900">VedaAI</span>
                  <span class="text-[10px] bg-orange-100 text-orange-700 px-1.5 py-0.5 rounded-full font-bold">PRO</span>
                </div>
                <p class="text-xs text-slate-400 font-medium">Hiring Assignment Sandbox</p>
              </div>
            </div>

            <!-- Create Assignment button action -->
            <button onclick="changeTab('assignments'); changeStep(1);" class="w-full bg-gradient-to-r from-orange-600 via-orange-500 to-amber-500 text-white font-semibold py-3 px-4 rounded-xl shadow-md hover:shadow-lg shadow-orange-500/25 transition duration-200 transform hover:-translate-y-0.5 flex items-center justify-center space-x-2 text-sm">
              <i data-lucide="plus" class="w-4.5 h-4.5 stroke-[3]"></i>
              <span>Create Assignment</span>
            </button>

            <!-- Navigation Links -->
            <nav class="space-y-1.5">
              <button onclick="changeTab('home')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${state.activeTab === 'home' ? 'bg-orange-50 text-orange-600' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}">
                <i data-lucide="home" class="w-4.5 h-4.5 ${state.activeTab === 'home' ? 'text-orange-500' : 'text-slate-400'}"></i>
                <span>Home</span>
              </button>

              <button onclick="changeTab('groups')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${state.activeTab === 'groups' ? 'bg-orange-50 text-orange-600' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}">
                <i data-lucide="users" class="w-4.5 h-4.5 ${state.activeTab === 'groups' ? 'text-orange-500' : 'text-slate-400'}"></i>
                <span>My Groups</span>
              </button>

              <button onclick="changeTab('assignments')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl font-semibold text-sm transition ${state.activeTab === 'assignments' ? 'bg-slate-100 text-slate-900' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}">
                <div class="flex items-center space-x-3">
                  <i data-lucide="file-text" class="w-4.5 h-4.5 ${state.activeTab === 'assignments' ? 'text-slate-900' : 'text-slate-400'}"></i>
                  <span>Assignments</span>
                </div>
                <span class="bg-orange-100 text-orange-700 text-xs px-2 py-0.5 rounded-full font-bold">Active</span>
              </button>

              <button onclick="changeTab('toolkit')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${state.activeTab === 'toolkit' ? 'bg-orange-50 text-orange-600' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}">
                <i data-lucide="briefcase" class="w-4.5 h-4.5 ${state.activeTab === 'toolkit' ? 'text-orange-500' : 'text-slate-400'}"></i>
                <span>AI Teacher's Toolkit</span>
              </button>

              <button onclick="changeTab('library')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${state.activeTab === 'library' ? 'bg-orange-50 text-orange-600' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}">
                <i data-lucide="book-open" class="w-4.5 h-4.5 ${state.activeTab === 'library' ? 'text-orange-500' : 'text-slate-400'}"></i>
                <span>My Library</span>
              </button>

              <div class="pt-4 border-t border-slate-100 mt-4">
                <button onclick="changeTab('settings')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${state.activeTab === 'settings' ? 'bg-orange-50 text-orange-600' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}">
                  <i data-lucide="settings" class="w-4.5 h-4.5 ${state.activeTab === 'settings' ? 'text-orange-500' : 'text-slate-400'}"></i>
                  <span>Settings</span>
                </button>
              </div>
            </nav>
          </div>

          <!-- Bottom Profile Affiliations -->
          <div class="mt-auto space-y-2">
            <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl flex items-center space-x-3">
              <div class="w-10 h-10 rounded-full bg-orange-100 flex-shrink-0 flex items-center justify-center overflow-hidden border border-orange-200">
                <span class="text-xl">${state.selectedProfileImage}</span>
              </div>
              <div class="min-w-0 flex-1">
                <h4 class="text-xs font-bold text-slate-800 truncate">${state.schoolName}</h4>
                <p class="text-[10px] text-slate-400 truncate font-semibold">${state.schoolCity}</p>
              </div>
            </div>

            <button onclick="state.isLoggedIn = false; render(); triggerNotification('Workspace cleared safely.');" class="w-full flex items-center justify-center gap-1 py-1.5 text-[10px] font-bold text-slate-400 hover:text-rose-500 transition">
              <i data-lucide="log-out" class="w-3 h-3"></i>
              <span>Sign Out Workspace</span>
            </button>
          </div>
        </aside>

        <!-- BACKGROUND SHADOW FOR MOBILE SIDEBAR -->
        ${state.sidebarOpen ? `<div onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-30 md:hidden"></div>` : ''}

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto max-w-7xl mx-auto w-full">
          <!-- Top Control Header -->
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between pb-6 mb-6 border-b border-slate-200 gap-4 print:hidden">
            <div>
              <div class="flex items-center space-x-2 text-xs text-slate-400 font-bold tracking-wider uppercase mb-1">
                <span>Teacher Portal</span>
                <i data-lucide="chevron-right" class="w-3 h-3"></i>
                <span class="text-slate-900 capitalize">${state.activeTab}</span>
              </div>
              <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight flex items-center space-x-3">
                <span class="capitalize">${state.activeTab} Workspace</span>
                ${state.activeTab === 'assignments' ? `
                  <span class="bg-gradient-to-r from-orange-500 to-amber-500 text-white text-[10px] font-extrabold px-2 py-0.5 rounded-md tracking-widest flex items-center gap-1">
                    <i data-lucide="sparkles" class="w-2.5 h-2.5 fill-white"></i> POWERED BY GEMINI 2.5
                  </span>
                ` : ''}
              </h1>
            </div>

            <div class="flex items-center gap-2">
              <div class="bg-white border border-slate-200 rounded-xl px-4 py-2 flex items-center gap-2 shadow-xs">
                <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-xs font-bold text-slate-600">${state.teacherName}</span>
              </div>
            </div>
          </div>

          <!-- Dynamic tab body content -->
          <div class="w-full">${tabContent}</div>
        </main>
      `;

      // Mount dynamic Lucide Icons
      lucide.createIcons();
    }

    // Run first initialization mount
    window.onload = function() {
      render();
    };
  </script>
</body>
</html>
